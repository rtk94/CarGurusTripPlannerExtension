<!DOCTYPE html>
<html>
<head>
    <title>AutoTour Dashboard</title>
    <meta charset="utf-8" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/leaflet.css" />
    <link rel="stylesheet" href="../assets/dashboard.css" />
    <script src="../assets/leaflet.js"></script>
    <script src="../assets/cities.js"></script>
</head>
<body>
    <div id="sidebar">
        <div class="header">
            <h2>🚗 AutoTour</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search make, model, city...">
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <a class="filter-toggle" id="filter-toggle-link" style="margin-top: 0;">Filter Results ▼</a>
                <a id="theme-toggle" style="cursor: pointer; font-size: 16px;" title="Toggle Dark Mode">🌙</a>
            </div>
        </div>

        <div id="filter-panel">
            <div class="filter-grid">
                <div class="filter-group">
                    <label>Min Price</label>
                    <input type="number" id="f-min-price" placeholder="0">
                </div>
                <div class="filter-group">
                    <label>Max Price</label>
                    <input type="number" id="f-max-price" placeholder="Max">
                </div>
                <div class="filter-group">
                    <label>Max Mileage</label>
                    <input type="number" id="f-max-miles" placeholder="Max">
                </div>
                <div class="filter-group">
                    <label>Deal Rating</label>
                    <select id="f-deal">
                        <option value="">Any</option>
                        <option value="GREAT_PRICE">Great</option>
                        <option value="GOOD_PRICE">Good</option>
                        <option value="FAIR_PRICE">Fair</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Min Year</label>
                    <input type="number" id="f-min-year" placeholder="Min">
                </div>
                <div class="filter-group">
                    <label>Max Year</label>
                    <input type="number" id="f-max-year" placeholder="Max">
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn btn-clear" id="btn-filter-clear">Clear</button>
                <button class="btn btn-apply" id="btn-filter-apply">Apply</button>
            </div>
        </div>

        <div class="list-controls">
            <label style="font-size: 11px; font-weight: 600; color: #5f6368;"><input type="checkbox" id="autocenter-toggle" checked> Auto-Center</label>
            <button id="export-csv" class="btn-csv">Download CSV</button>
        </div>
        
        <div id="route-panel" style="display: block;">
            <h3>📍 Trip Route Builder</h3>
            <div id="route-stops">No stops added yet.</div>
            <button class="btn-start-route" id="btn-start-route" style="display: none;">Start Trip in Google Maps</button>
        </div>
        
        <div id="car-list"></div>
    </div>
    <div id="map"></div>
    <script src="dashboard.js"></script>
</body>
</html>
