<!DOCTYPE html>
<html>
<head>
    <title>Car Trip Map Dashboard</title>
    <meta charset='utf-8' />
    <link rel='stylesheet' href='../assets/leaflet.css' />
    <script src='../assets/leaflet.js'></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #f8f9fa; border-right: 1px solid #dee2e6; display: flex; flex-direction: column; z-index: 1000; }
        #map { flex-grow: 1; height: 100%; }
        .header { padding: 20px; background: white; border-bottom: 1px solid #dee2e6; }
        .header h2 { margin: 0 0 15px 0; font-size: 20px; color: #1a73e8; }
        .header input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .controls { padding: 10px 20px; background: white; border-bottom: 1px solid #dee2e6; display: flex; justify-content: space-between; align-items: center; }
        .btn-csv { padding: 6px 12px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        #car-list { flex-grow: 1; overflow-y: auto; padding: 10px; background: #f1f3f4; }
        .car-card { background: white; border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; position: relative; border: 2px solid transparent; }
        .car-card:hover { border-color: #1a73e8; }
        .car-card.hidden { opacity: 0.5; filter: grayscale(100%); }
        .car-card h4 { margin: 0 0 5px 0; font-size: 15px; }
        .car-card .price { font-weight: bold; color: #2e7d32; }
        .visibility-toggle { position: absolute; top: 12px; right: 12px; transform: scale(1.3); z-index: 5; }
        .car-popup { width: 220px; }
        .car-popup img { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div id='sidebar'>
        <div class='header'>
            <h2>Car Search Dashboard</h2>
            <input type='text' id='search-input' placeholder='Search cars...'>
        </div>
        <div class='controls'>
            <label style='font-size: 12px;'><input type='checkbox' id='autocenter-toggle' checked> Auto-Center</label>
            <button id='export-csv' class='btn-csv'>Export CSV</button>
        </div>
        <div id='car-list'></div>
    </div>
    <div id='map'></div>
    <script src='dashboard.js'></script>
</body>
</html>
